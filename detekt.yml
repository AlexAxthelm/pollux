build:
  maxIssues: 0

style:
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludeCommentStatements: true
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2', '8', '16', '56']
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
  LongMethod:
    threshold: 60

naming:
  FunctionNaming:
    active: true
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
    excludes: ['**/ui/**', '**/presentation/**']
